services:
  mysql:
    image: mysql:8.0
    container_name: culinary-recipes-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: culinary_recipes_platform
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
