spring.application.name=culinary_recipes_platform

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/culinary_recipes_platform}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeThisSecretToAtLeast32Characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.upload.dir=uploads
app.upload.avatars-dir=uploads/avatars
app.upload.recipes-dir=uploads/recipes

app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
